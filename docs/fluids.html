<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>H.A.H.N.S — Fluids &amp; Capacities</title>
<style>
  :root { --vw:#001e50; --ink:#1c1c1c; --mut:#5a6b8c; --line:#e3e3e3; --bg:#eef1f6;
          --oil:#b8860b; --cool:#0f6e9c; --ac:#0f6e56; --drive:#534ab7; }
  * { box-sizing:border-box; -webkit-text-size-adjust:100%; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--ink); background:var(--bg); }
  .wrap { max-width:580px; margin:0 auto; padding:0 14px 40px; }
  header { background:var(--vw); color:#fff; padding:16px 14px; }
  header .h { max-width:580px; margin:0 auto; display:flex; align-items:center; gap:10px; }
  header svg { width:22px; height:22px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  header b { font-size:16px; font-weight:600; }
  header span { font-size:12px; color:#aebfe0; margin-left:auto; }
  .veh { background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin:14px 0; }
  .veh .t { font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--mut); margin-bottom:7px; }
  .veh .grid { display:grid; grid-template-columns:auto 1fr; gap:3px 10px; font-size:13px; }
  .veh .k { color:var(--mut); font-weight:600; white-space:nowrap; }
  .veh .v { font-weight:700; color:var(--vw); word-break:break-word; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; margin:12px 0; overflow:hidden; }
  .card .hd { display:flex; align-items:center; gap:9px; padding:12px 14px; border-left:5px solid var(--mut); }
  .card .hd svg { width:19px; height:19px; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .card .hd b { font-size:14px; font-weight:700; }
  .card.oil .hd { border-left-color:var(--oil); } .card.oil .hd svg { stroke:var(--oil); }
  .card.cool .hd { border-left-color:var(--cool); } .card.cool .hd svg { stroke:var(--cool); }
  .card.ac .hd { border-left-color:var(--ac); } .card.ac .hd svg { stroke:var(--ac); }
  .card.drive .hd { border-left-color:var(--drive); } .card.drive .hd svg { stroke:var(--drive); }
  .card .body { padding:2px 14px 12px; }
  .row { padding:9px 0; border-top:1px solid #f0f0f0; }
  .row:first-child { border-top:0; }
  .row .lab { font-size:12px; color:var(--mut); font-weight:600; }
  .row .cap { font-size:17px; font-weight:700; color:var(--ink); margin:2px 0; }
  .row .cap small { font-size:13px; font-weight:600; color:var(--mut); }
  .row .spec { font-size:12.5px; color:#3a4a63; }
  .tag { display:inline-block; font-size:10.5px; font-weight:700; letter-spacing:.03em; padding:1px 7px; border-radius:20px;
         background:var(--bg); color:var(--vw); margin-left:6px; vertical-align:1px; }
  .fill { display:inline-block; margin-right:14px; }
  .fill b { font-weight:700; }
  .none { font-size:13px; color:#9a9a9a; font-style:italic; padding:8px 0; }
  .warn { background:#fff8e6; border:1px solid #f3e2b3; color:#6b5300; border-radius:10px; padding:11px 13px; font-size:12.5px; margin:14px 0; line-height:1.4; }
  .err { background:#fff5f5; border:1px solid #e6b0b0; color:#7a1f1f; border-radius:10px; padding:13px 14px; font-size:13.5px; margin:16px 0; line-height:1.45; }
  .ft { font-size:11px; color:var(--mut); text-align:center; margin-top:18px; line-height:1.5; }
</style>
</head>
<body>
<header><div class="h">
  <svg viewBox="0 0 24 24"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4l-6 6 2 2 6-6a4 4 0 0 0 5.4-5.4l-2.3 2.3-2-2 2.3-2.3z"/></svg>
  <b>Fluids &amp; Capacities</b><span id="stamp">v0.3.5.2-alpha · 2026-06-27 17:52 UTC</span>
</div></header>
<div class="wrap"><div id="out"></div>
  <div class="ft">Approximate quantities — always confirm against the Repair Manual / Maintenance Procedures.<br>H.A.H.N.S · matched to your vehicle, nothing saved.</div>
</div>

<script>
"use strict";
/* light-obfuscation decode — mirrors tools/fluids-codec.js (same KEY) */
var KEY = "h@hns-fluid-codec-v1-2026";
function deobf(b64) {
  var bin = atob(b64), bytes = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i) ^ KEY.charCodeAt(i % KEY.length);
  return JSON.parse(new TextDecoder("utf-8").decode(bytes));
}
function esc(s){ return String(s == null ? "" : s).replace(/[&<>"]/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]; }); }
function up(s){ return String(s || "").toUpperCase(); }
function qs(k){ try { return new URLSearchParams(location.search).get(k) || ""; } catch(e){ return ""; } }

/* ---- the vehicle, from the panel's URL params (no VIN, by design) ---- */
var VEH = { year: qs("y"), model: qs("m"), engine: up(qs("e")), trans: up(qs("t")) };
// a vehicle can carry more than one trans code — EVs list front + rear drive
// units (e.g. "0MH / 0MK"); ICE is one ("09PA - AQ450-8A"). Keep them all.
VEH.transCodes = up(VEH.trans).split(/[^A-Z0-9]/).filter(function(s){ return /^[A-Z0-9]{3,6}$/.test(s); });
VEH.transCode = VEH.transCodes[0] || "";                      // first, for the "no match" note
VEH.awd = /\bAWD\b|4 ?MOTION|4MOT/i.test(VEH.model);

var ICON = {
  // oil can
  oil:   "M3 12h9l3-2 6 1v1l-6 1M3 12v6a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1v-6M7 12V9h3v3M19.5 7l1-2M20.5 5c.5.7.8 1.2.8 1.6a.8.8 0 0 1-1.6 0c0-.4.3-.9.8-1.6z",
  // thermometer (coolant temperature)
  cool:  "M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z",
  // snowflake (A/C)
  ac:    "M12 2v20M4.2 7l15.6 10M19.8 7L4.2 17M12 2l-2.4 2.4M12 2l2.4 2.4M12 22l-2.4-2.4M12 22l2.4-2.4M4.2 7l3.3-.4M4.2 7l.4 3.3M19.8 17l-3.3.4M19.8 17l-.4-3.3M19.8 7l-.4 3.3M19.8 7l-3.3-.4M4.2 17l.4-3.3M4.2 17l3.3.4",
  // gear (drivetrain / transmission)
  drive: "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
};

/* ----------------------------- matching ----------------------------- */
function codesIn(text){
  var m = /\(([^)]*)\)/.exec(text || "");
  return m ? m[1].split(/[\/,]/).map(function(s){ return up(s).trim(); }).filter(function(s){ return /^[A-Z0-9]{2,6}$/.test(s); }) : [];
}
function bareCodes(text){ return up(text).split(/[\/,]/).map(function(s){ return s.trim(); }).filter(function(s){ return /^[A-Z0-9]{2,6}$/.test(s); }); }

// normalise a model name for comparison: drop the generic word "Family" and ALL
// punctuation/spaces so "ID.4" matches ELSA's "ID.4 AWD PRO S", "ID.Buzz" matches
// "ID. BUZZ 1ST EDITION AWD", and "Atlas Family" matches "ATLAS SEL AWD".
function modelNorm(s){ return up(s).replace(/\bFAMILY\b/g, " ").replace(/[^A-Z0-9]/g, ""); }
function pickModel(models){
  var vm = modelNorm(VEH.model);
  if (/GTI|GOLFR/.test(vm)) vm += "GOLF";   // GTI / Golf R are grouped under "Golf Family"
  var best = null, score = -1;
  models.forEach(function(m){
    up(m.model).split("/").forEach(function(tok){
      var t = modelNorm(tok);
      if (t && vm.indexOf(t) >= 0 && t.length > score) { score = t.length; best = m; }
    });
  });
  return best;
}
// trans codes from an Application cell — both parenthesised "(09P)" and bare
// "Single Speed 0MH" (EV reduction gears are often written without parens).
function appTransCodes(app){
  var cs = codesIn(app);
  (up(app).match(/\b0[A-Z0-9]{2,3}\b/g) || []).forEach(function(c){ if (cs.indexOf(c) < 0) cs.push(c); });
  return cs;
}
function transHit(app){
  var cs = appTransCodes(app);
  if (!cs.length || !VEH.transCodes.length) return false;
  return cs.some(function(c){
    return VEH.transCodes.some(function(t){ return t && (t.indexOf(c) === 0 || c.indexOf(t) === 0); });
  });
}
var TRANS_RE = /\d+\s*-?\s*speed|single\s*(?:gear|speed)|direct shift|gearbox|automatic|manual|dsg|tiptronic/i;

/* ----------------------------- render ------------------------------- */
function capHtml(fills){
  return fills.map(function(f){
    return '<span class="fill">' + (f.label ? '<span class="lab">' + esc(f.label) + '</span> ' : "") + "<b>" + esc(f.value) + "</b></span>";
  }).join("");
}
function card(cls, icon, title, inner){
  return '<div class="card ' + cls + '"><div class="hd"><svg viewBox="0 0 24 24"><path d="' + icon + '"/></svg><b>' +
    esc(title) + "</b></div><div class=\"body\">" + (inner || '<div class="none">Not listed for this vehicle.</div>') + "</div></div>";
}

function renderOil(m){
  var rows = (m.engineOil || []).filter(function(r){ return (r.engines || []).indexOf(VEH.engine) >= 0; });
  var fallback = !rows.length && (m.engineOil || []).length;
  if (fallback) rows = m.engineOil;
  var inner = rows.map(function(r){
    return '<div class="row"><div class="cap">' + esc(r.capacity || "—") + "</div>" +
      (r.specs && r.specs.length ? '<div class="spec">' + esc(r.specs.join("  ·  ")) + "</div>" : "") +
      (fallback ? '<div class="lab">' + esc(r.desc || (r.engines || []).join("/")) + "</div>" : "") + "</div>";
  }).join("");
  if (fallback && inner) inner += '<div class="lab" style="margin-top:6px">No exact engine-code match for ' + esc(VEH.engine) + " — all engines shown.</div>";
  return card("oil", ICON.oil, "Engine Oil", inner);
}
function renderCoolant(m){
  var rows = (m.engineCoolant || []).filter(function(r){ return bareCodes(r.application).indexOf(VEH.engine) >= 0; });
  if (!rows.length) rows = m.engineCoolant || [];
  var inner = rows.map(function(r){
    return '<div class="row"><div class="cap">' + esc((r.fills[0] && r.fills[0].value) || "—") + "</div></div>";
  }).join("");
  return card("cool", ICON.cool, "Engine Coolant", inner);
}
function renderAC(m){
  var inner = (m.airConditioning || []).map(function(r){
    var name = r.component.replace(/\s*\(R\s?1234yf\)|\s*\(R\s?134a\)/ig, "").trim();
    return '<div class="row"><div class="lab">' + esc(name) +
      (r.refrigerant ? '<span class="tag">' + esc(r.refrigerant) + "</span>" : "") +
      (r.application && !/^all/i.test(r.application) ? ' <span class="lab">· ' + esc(r.application) + "</span>" : "") +
      '</div><div class="cap">' + capHtml(r.fills) + "</div></div>";
  }).join("");
  return card("ac", ICON.ac, "Air Conditioning", inner);
}
function renderDrive(m){
  var all = m.drivetrain || [];
  var trans = all.filter(function(r){ return TRANS_RE.test(r.application); });
  var subs  = all.filter(function(r){ return !TRANS_RE.test(r.application); });
  var matched = trans.filter(function(r){ return transHit(r.application); });
  var noMatch = !matched.length && trans.length;
  if (noMatch) matched = trans;                       // fallback: show all transmissions
  // sub-components: hide "only AWD" parts on a FWD vehicle, otherwise show all
  subs = subs.filter(function(r){ return VEH.awd || !/AWD/i.test(r.application); });
  var rowHtml = function(r){
    // prefer the descriptive name; if the Application is only a qualifier
    // ("Only AWD", "All Vehicles") show the Component instead and keep the qualifier small
    var qualOnly = /^(only\b|all\b|awd$|fwd$)/i.test(r.application || "");
    var name = qualOnly ? (r.component || r.application) : (r.application || r.component);
    var qual = (qualOnly && r.application) ? ' <span class="lab">· ' + esc(r.application) + "</span>" : "";
    return '<div class="row"><div class="lab">' + esc(name) + qual + "</div>" +
      '<div class="cap">' + capHtml(r.fills) + "</div></div>";
  };
  var inner = matched.map(rowHtml).join("") + subs.map(rowHtml).join("");
  if (noMatch && inner) inner += '<div class="lab" style="margin-top:6px">No match for transmission ' + esc(VEH.transCode || VEH.trans) + " — all transmissions shown.</div>";
  return card("drive", ICON.drive, "Drivetrain", inner);
}

function vehBar(){
  var f = [["Model Year", VEH.year], ["Model", VEH.model], ["Engine Code", VEH.engine], ["Trans Type", VEH.trans + (VEH.awd ? " · AWD" : "")]];
  return '<div class="veh"><div class="t">Vehicle</div><div class="grid">' +
    f.map(function(p){ return '<span class="k">' + esc(p[0]) + '</span><span class="v">' + esc(p[1] || "—") + "</span>"; }).join("") +
    "</div></div>";
}

function show(html){ document.getElementById("out").innerHTML = html; }

function start(){
  if (!VEH.year) { show('<div class="err">No vehicle was passed in. Open this from the <b>Fluids &amp; Capacities</b> link inside H.A.H.N.S after scanning the Vehicle Summary.</div>'); return; }
  show(vehBar() + '<div class="warn">Loading ' + esc(VEH.year) + " fluid data…</div>");
  fetch("fluids/" + encodeURIComponent(VEH.year) + ".json", { cache: "no-store" })
    .then(function(r){ if (!r.ok) throw 0; return r.json(); })
    .then(function(file){
      var data = deobf(file.d);
      var m = pickModel(data.models || []);
      if (!m) { show(vehBar() + '<div class="err">No fluid entry found for <b>' + esc(VEH.model) + "</b> in the " + esc(VEH.year) + " tables.</div>"); return; }
      show(vehBar() + renderOil(m) + renderCoolant(m) + renderAC(m) + renderDrive(m));
    })
    .catch(function(){
      show(vehBar() + '<div class="err">No fluid data is published for <b>' + esc(VEH.year) + "</b> yet.</div>");
    });
}
start();
</script>
</body>
</html>
