<!-- src/update.html — the Hahns update window (build.js copies it to docs/update.html).
     Opened as a popup by the loader bookmarklet. It runs on GitHub Pages (its own
     origin, no restrictive CSP), so it CAN fetch app.js; it hands the code back to
     the ELSA page via postMessage, then closes itself.

     Behaviour:
       - first install (loader has no version)  -> fetch + hand over silently
       - already current                        -> say so, close
       - a newer version exists                 -> ASK the tech (installed vs latest,
                                                   Update now / Not now); only fetch on yes
     Fetches only Hahns's own files — never touches ELSA/manual content. -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>H.A.H.N.S update</title>
<style>
  body{font:14px/1.5 system-ui,-apple-system,sans-serif;margin:0;padding:18px;
       background:#111;color:#eee;text-align:center}
  #msg{font-weight:500;margin-bottom:12px}
  #vers{display:none;margin:10px 0}
  .vrow{margin:4px 0}
  .vrow span{color:#9aa0a6}
  .vrow b{font-weight:700}
  #cur{color:#e8e8e8}
  #latest{color:#2fb84d}
  #btns{display:none;gap:10px;justify-content:center;margin-top:16px}
  button{font:700 14px system-ui;border:0;border-radius:8px;padding:10px 18px;cursor:pointer}
  #yes{background:#2fb84d;color:#04210f}
  #no{background:#333;color:#ddd}
</style>
<div id="msg">Checking for the latest H.A.H.N.S…</div>
<div id="vers">
  <div class="vrow"><span>Installed:</span> <b id="cur"></b></div>
  <div class="vrow"><span>Latest:</span> <b id="latest"></b></div>
</div>
<div id="btns">
  <button id="yes">Update now</button>
  <button id="no">Not now</button>
</div>
<script>
(function () {
  var opener = window.opener;
  var msg = document.getElementById("msg"),
      vers = document.getElementById("vers"),
      btns = document.getElementById("btns"),
      cur = document.getElementById("cur"),
      latestEl = document.getElementById("latest");

  function post(m){ try { opener.postMessage(m, "*"); } catch (e) { } }  // loader validates our origin
  function done(){ try { window.close(); } catch (e) { } }

  if (!opener) { msg.textContent = "Opened directly — nothing to do."; setTimeout(done, 1200); return; }

  var have = "";
  try { have = new URLSearchParams(location.search).get("v") || ""; } catch (e) { }
  var cb = "?cb=" + Date.now();

  // download the full app and hand it to the loader, then close
  function deliver(latest, okMsg) {
    return fetch("./app.js" + cb)
      .then(function (r) { if (!r.ok) throw new Error("app.js " + r.status); return r.text(); })
      .then(function (code) {
        if (!code || code.length < 100) throw new Error("empty app.js");
        post({ source: "hahns-updater", version: latest, code: code });
        msg.textContent = okMsg;
        setTimeout(done, 700);
      });
  }

  // 1) always fetch the tiny version file first
  fetch("./version.json" + cb)
    .then(function (r) { return r.ok ? r.json() : { version: "" }; })
    .catch(function () { return { version: "" }; })
    .then(function (vj) {
      var latest = (vj && vj.version) || "";

      // already current -> tell the loader, no download, no prompt
      if (have && latest && latest === have) {
        post({ source: "hahns-updater", upToDate: true, version: latest });
        msg.textContent = "H.A.H.N.S is up to date ✓";
        setTimeout(done, 600);
        return;
      }

      // first install (loader has nothing yet) -> just get it
      if (!have) {
        msg.textContent = "Installing H.A.H.N.S…";
        return deliver(latest, "Installed ✓");
      }

      // a newer version exists -> ASK the tech
      msg.textContent = "A newer version of H.A.H.N.S is available.";
      cur.textContent = "v" + have;
      latestEl.textContent = "v" + latest;
      vers.style.display = "block";
      btns.style.display = "flex";
      document.getElementById("yes").onclick = function () {
        btns.style.display = "none";
        msg.textContent = "Updating…";
        deliver(latest, "Updated ✓");
      };
      document.getElementById("no").onclick = function () {
        post({ source: "hahns-updater", dismissed: true, version: latest });
        msg.textContent = "Okay — keeping your current version.";
        setTimeout(done, 900);
      };
    })
    .catch(function (e) {
      msg.textContent = "Couldn’t check for updates (" + String(e) + ").";
      setTimeout(done, 1600);
    });
})();
</script>
